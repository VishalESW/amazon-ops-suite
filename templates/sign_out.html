<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>Signing out…</title>
  <style>:root{color-scheme:dark} body{margin:0;min-height:100dvh;display:grid;place-items:center;background:#0a0f1c;color:#9aa7bd;font-family:system-ui,sans-serif}</style>
</head>
<body>
  <p>Signing out…</p>
  {% if clerk_frontend_api %}
  <script async crossorigin="anonymous" data-clerk-publishable-key="{{ clerk_pk }}"
    src="https://{{ clerk_frontend_api }}/npm/@clerk/clerk-js@5/dist/clerk.browser.js" type="text/javascript"></script>
  {% endif %}
  <script>
    window.addEventListener('load', async function(){
      try { await Clerk.load(); await Clerk.signOut(); } catch(e) {}
      window.location.href = '/sign-in';
    });
  </script>
</body>
</html>
